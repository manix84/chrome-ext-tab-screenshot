name: Release Chrome Extension

on:
  push:
    branches:
      - main
    paths:
      - manifest.json

  workflow_dispatch:
    inputs:
      force_release:
        description: Force release even if version did not change
        required: false
        default: "false"
      version_override:
        description: Override version for the release tag/assets
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            OLD_VERSION="$(git show HEAD^:manifest.json | jq -r '.version')"
          else
            OLD_VERSION="0.0.0"
          fi

          NEW_VERSION="$(jq -r '.version' manifest.json)"

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

      - name: Decide if release should run
        id: version_check
        shell: bash
        env:
          FORCE_RELEASE: ${{ github.event.inputs.force_release || 'false' }}
          OLD_VERSION: ${{ steps.versions.outputs.old_version }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          set -euo pipefail

          if [ "$FORCE_RELEASE" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 -c "
from packaging.version import Version
import os

old = os.environ['OLD_VERSION']
new = os.environ['NEW_VERSION']

with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
    if Version(new) > Version(old):
        f.write('should_release=true\n')
    else:
        f.write('should_release=false\n')
"

      - name: Resolve final version
        id: final_version
        shell: bash
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
          MANIFEST_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          set -euo pipefail

          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "version=$VERSION_OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when no release is needed
        if: steps.version_check.outputs.should_release != 'true'
        run: echo "No release needed."

      - name: Set up Chrome
        if: steps.version_check.outputs.should_release == 'true'
        uses: browser-actions/setup-chrome@v1

      - name: Restore private key
        if: steps.version_check.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.CHROME_EXTENSION_PEM_BASE64 }}" | base64 -d > extension.pem
          chmod 600 extension.pem

      - name: Pack CRX
        if: steps.version_check.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build

          chrome --headless=new \
            --disable-gpu \
            --no-sandbox \
            --pack-extension="$GITHUB_WORKSPACE" \
            --pack-extension-key="$GITHUB_WORKSPACE/extension.pem"

          mv "$GITHUB_WORKSPACE.crx" "build/one-click-screenshot-${{ steps.final_version.outputs.version }}.crx"

      - name: Create source zip
        if: steps.version_check.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build
          zip -r "build/one-click-screenshot-${{ steps.final_version.outputs.version }}.zip" . \
            -x ".git/*" ".github/*" "build/*"

      - name: Create GitHub release
        if: steps.version_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.final_version.outputs.version }}"
          TAG="v$VERSION"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            "build/one-click-screenshot-$VERSION.crx" \
            "build/one-click-screenshot-$VERSION.zip"
