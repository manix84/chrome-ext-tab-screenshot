name: Release Chrome Extension

on:
  push:
    branches:
      - main
    paths:
      - manifest.json

  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if version did not change"
        required: false
        default: "false"
      version_override:
        description: "Override version (optional)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            OLD_VERSION="$(git show HEAD^:manifest.json | jq -r '.version')"
          else
            OLD_VERSION="0.0.0"
          fi

          NEW_VERSION="$(jq -r '.version' manifest.json)"

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Decide if release should run
        id: version_check
        env:
          FORCE: ${{ github.event.inputs.force_release }}
          OLD: ${{ steps.versions.outputs.old_version }}
          NEW: ${{ steps.versions.outputs.new_version }}
        run: |
          set -euo pipefail

          if [ "$FORCE" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - << 'PY'
import os
from packaging.version import Version

old = os.environ["OLD"]
new = os.environ["NEW"]

if Version(new) > Version(old):
    print("should_release=true")
    with open(os.environ["GITHUB_OUTPUT"], "a") as f:
        f.write("should_release=true\n")
else:
    print("should_release=false")
    with open(os.environ["GITHUB_OUTPUT"], "a") as f:
        f.write("should_release=false\n")
PY

      - name: Resolve final version
        id: final_version
        run: |
          OVERRIDE="${{ github.event.inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            echo "version=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.versions.outputs.new_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Chrome
        if: steps.version_check.outputs.should_release == 'true'
        uses: browser-actions/setup-chrome@v1

      - name: Restore private key
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          echo "${{ secrets.CHROME_EXTENSION_PEM_BASE64 }}" | base64 -d > extension.pem
          chmod 600 extension.pem

      - name: Pack CRX
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          mkdir -p build

          chrome --headless=new \
            --disable-gpu \
            --no-sandbox \
            --pack-extension="${GITHUB_WORKSPACE}" \
            --pack-extension-key="${GITHUB_WORKSPACE}/extension.pem"

          mv "${GITHUB_WORKSPACE}.crx" "build/one-click-screenshot-${{ steps.final_version.outputs.version }}.crx"

      - name: Zip source
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          mkdir -p build
          zip -r "build/one-click-screenshot-${{ steps.final_version.outputs.version }}.zip" . \
            -x ".git/*" ".github/*" "build/*"

      - name: Create release
        if: steps.version_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.final_version.outputs.version }}"
          TAG="v${VERSION}"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            "build/one-click-screenshot-${VERSION}.crx" \
            "build/one-click-screenshot-${VERSION}.zip"
